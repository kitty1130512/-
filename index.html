<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>螢光筆筆記</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F5F2;
  --surface: #FFFFFF;
  --sidebar: #1E1E1E;
  --sidebar-hover: #2E2E2E;
  --sidebar-active: #3A3A3A;
  --sidebar-text: #E0E0DC;
  --sidebar-text-dim: #888880;
  --border: rgba(0,0,0,0.09);
  --border-md: rgba(0,0,0,0.16);
  --text: #1A1A18;
  --text-secondary: #6B6B67;
  --text-tertiary: #A8A8A4;
  --radius: 8px;
  --accent: #FFE066;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141414;
    --surface: #1E1E1E;
    --sidebar: #111111;
    --sidebar-hover: #222222;
    --sidebar-active: #2A2A2A;
    --border: rgba(255,255,255,0.08);
    --border-md: rgba(255,255,255,0.15);
    --text: #EDEDE9;
    --text-secondary: #999995;
    --text-tertiary: #555550;
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid rgba(255,255,255,0.05);
}

.sb-head {
  padding: 18px 16px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.sb-logo {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}

.sb-title {
  font-size: 14px; font-weight: 600;
  color: var(--sidebar-text);
  letter-spacing: -0.01em;
}

.sb-section {
  padding: 12px 12px 6px;
  font-size: 10px; font-weight: 600;
  color: var(--sidebar-text-dim);
  text-transform: uppercase; letter-spacing: 0.08em;
  display: flex; align-items: center; justify-content: space-between;
}

.sb-new-btn {
  background: none; border: none;
  color: var(--sidebar-text-dim);
  cursor: pointer; font-size: 18px; line-height: 1;
  padding: 0 2px; transition: color 0.15s;
}
.sb-new-btn:hover { color: var(--sidebar-text); }

#notebook-list {
  flex: 1; overflow-y: auto; padding: 4px 8px 8px;
}

.nb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 6px;
  cursor: pointer; transition: background 0.12s;
  color: var(--sidebar-text-dim); font-size: 13px;
  position: relative; user-select: none;
}
.nb-item:hover { background: var(--sidebar-hover); color: var(--sidebar-text); }
.nb-item.active { background: var(--sidebar-active); color: var(--sidebar-text); }

.nb-icon { font-size: 14px; flex-shrink: 0; }

.nb-name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.nb-name-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--sidebar-text); font: inherit; font-size: 13px;
  min-width: 0;
}

.nb-actions {
  display: none; gap: 2px; flex-shrink: 0;
}
.nb-item:hover .nb-actions,
.nb-item.active .nb-actions { display: flex; }

.nb-action-btn {
  background: none; border: none; cursor: pointer;
  color: var(--sidebar-text-dim); font-size: 13px;
  padding: 2px 4px; border-radius: 4px; transition: color 0.12s;
}
.nb-action-btn:hover { color: var(--sidebar-text); background: rgba(255,255,255,0.08); }

.sb-footer {
  padding: 10px 12px;
  border-top: 1px solid rgba(255,255,255,0.07);
  font-size: 11px; color: var(--sidebar-text-dim);
  display: flex; align-items: center; gap: 6px;
}
.save-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
.save-dot.saving { background: #FF9800; }

/* ── Main area ── */
#app-main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
}

header {
  padding: 11px 20px;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface);
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap; flex-shrink: 0;
}

#nb-title-display {
  font-size: 14px; font-weight: 600; color: var(--text);
  margin-right: 4px;
}

.toolbar { display: flex; align-items: center; gap: 7px; margin-left: auto; flex-wrap: wrap; }

.divider-v { width: 1px; height: 20px; background: var(--border); }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; font-size: 13px; font-weight: 500;
  border: 0.5px solid var(--border-md);
  border-radius: var(--radius); background: transparent;
  color: var(--text); cursor: pointer;
  transition: background 0.12s; font-family: inherit; white-space: nowrap;
}
.btn:hover { background: rgba(0,0,0,0.05); }
@media (prefers-color-scheme: dark) { .btn:hover { background: rgba(255,255,255,0.07); } }
.btn.active { background: rgba(0,0,0,0.07); }
@media (prefers-color-scheme: dark) { .btn.active { background: rgba(255,255,255,0.1); } }
.btn-export { background: #1A1A18; color: #F0F0EC; border-color: #1A1A18; }
.btn-export:hover { background: #333; }
@media (prefers-color-scheme: dark) {
  .btn-export { background: #EDEDE9; color: #1A1A18; border-color: #EDEDE9; }
  .btn-export:hover { background: #D8D8D4; }
}

.color-palette { display: flex; gap: 5px; align-items: center; }
.color-btn {
  width: 24px; height: 24px; border-radius: 50%;
  border: 2px solid transparent; cursor: pointer;
  transition: transform 0.12s; outline: none;
}
.color-btn:hover { transform: scale(1.15); }
.color-btn.active { border-color: var(--text); }

.mode-label {
  font-size: 11px; padding: 3px 9px; border-radius: 20px;
  background: rgba(255,90,90,0.12); color: #C0392B;
  font-weight: 500; display: none;
}
.mode-label.visible { display: inline-block; }

/* ── Editor / Highlights panes ── */
.work-area {
  flex: 1; display: grid;
  grid-template-columns: 1fr 320px;
  overflow: hidden; min-height: 0;
}

.pane { display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.pane-left { border-right: 0.5px solid var(--border); }

.pane-header {
  padding: 10px 18px 9px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  background: var(--surface); flex-shrink: 0;
}
.pane-label {
  font-size: 10px; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.08em;
}
.pane-count { font-size: 11px; color: var(--text-tertiary); margin-left: auto; }

#editor {
  flex: 1; padding: 22px 26px;
  font-size: 15px; line-height: 1.85;
  color: var(--text); outline: none;
  overflow-y: auto; word-break: break-word;
  background: var(--bg); min-height: 0;
}
#editor:empty::before {
  content: attr(data-placeholder);
  color: var(--text-tertiary); pointer-events: none; white-space: pre-wrap;
}

.highlights-scroll {
  flex: 1; overflow-y: auto; padding: 12px;
  background: var(--bg); min-height: 0;
  display: flex; flex-direction: column; gap: 6px;
  scroll-behavior: smooth;
}

.empty-state {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 8px;
  color: var(--text-tertiary); font-size: 13px;
  text-align: center; padding: 2rem; line-height: 1.6;
}
.empty-icon { font-size: 30px; opacity: 0.35; }

.hi-item {
  padding: 8px 12px; border-radius: var(--radius);
  font-size: 13px; line-height: 1.6; color: var(--text);
  border: 0.5px solid transparent;
  display: flex; gap: 9px; align-items: flex-start;
  cursor: pointer; transition: box-shadow 0.18s;
}
.hi-item:hover { box-shadow: 0 0 0 1.5px rgba(0,0,0,0.12); }
.hi-item.flash { box-shadow: 0 0 0 2px rgba(0,0,0,0.2); }
.hi-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }

mark {
  border-radius: 3px; padding: 1px 2px;
  cursor: pointer; transition: opacity 0.1s;
}
mark:hover { opacity: 0.75; }

/* ── Empty / no notebook ── */
#no-notebook {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; color: var(--text-tertiary); text-align: center;
}
#no-notebook h2 { font-size: 16px; font-weight: 500; color: var(--text-secondary); }
#no-notebook p { font-size: 13px; line-height: 1.6; }
.btn-primary {
  padding: 9px 22px; font-size: 14px; font-weight: 600;
  background: var(--accent); color: #3A2E00;
  border: none; border-radius: var(--radius); cursor: pointer;
  transition: opacity 0.12s; font-family: inherit;
}
.btn-primary:hover { opacity: 0.85; }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(4px);
}
.modal-backdrop.hidden { display: none; }
.modal {
  background: var(--surface); border-radius: 14px;
  padding: 28px 28px 22px; width: 320px; max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.modal input {
  width: 100%; padding: 9px 12px; font-size: 14px; font-family: inherit;
  border: 0.5px solid var(--border-md); border-radius: var(--radius);
  background: var(--bg); color: var(--text); outline: none;
  transition: border-color 0.15s;
}
.modal input:focus { border-color: #888; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

@media (max-width: 700px) {
  #sidebar { width: 180px; min-width: 0; }
  .work-area { grid-template-columns: 1fr; }
  .pane-right { max-height: 280px; }
}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">✍️</div>
    <span class="sb-title">螢光筆筆記</span>
  </div>

  <div class="sb-section">
    筆記本
    <button class="sb-new-btn" onclick="openNewModal()" title="新增筆記本">＋</button>
  </div>

  <div id="notebook-list"></div>

  <div class="sb-footer">
    <span class="save-dot" id="save-dot"></span>
    <span id="save-text">就緒</span>
  </div>
</div>

<!-- Main -->
<div id="app-main">

  <!-- No notebook selected -->
  <div id="no-notebook">
    <div style="font-size:48px">📓</div>
    <h2>沒有開啟的筆記本</h2>
    <p>從左側選擇或新增一個筆記本<br>開始記錄與標記</p>
    <button class="btn-primary" onclick="openNewModal()">＋ 新增筆記本</button>
  </div>

  <!-- Editor area (hidden until notebook selected) -->
  <div id="editor-area" style="display:none; flex:1; display:none; flex-direction:column; overflow:hidden;">
    <header>
      <span id="nb-title-display">未命名筆記本</span>
      <div class="toolbar">
        <div class="color-palette" id="color-palette">
          <button class="color-btn active" style="background:#FFE066" onclick="setColor('yellow','#FFE066','#7A6000',this)" title="黃色"></button>
          <button class="color-btn" style="background:#A8E6B0" onclick="setColor('green','#A8E6B0','#1A5C28',this)" title="綠色"></button>
          <button class="color-btn" style="background:#9BD4F5" onclick="setColor('blue','#9BD4F5','#0A4A6E',this)" title="藍色"></button>
          <button class="color-btn" style="background:#F9B8D0" onclick="setColor('pink','#F9B8D0','#7A1B40',this)" title="粉紅"></button>
          <button class="color-btn" style="background:#FFCB82" onclick="setColor('orange','#FFCB82','#7A4200',this)" title="橘色"></button>
        </div>
        <div class="divider-v"></div>
        <button class="btn active" id="btn-mark" onclick="setMode('highlight')">🖊 標記</button>
        <button class="btn" id="btn-erase" onclick="setMode('erase')">✕ 清除</button>
        <span class="mode-label" id="erase-label">清除模式</span>
        <div class="divider-v"></div>
        <button class="btn" onclick="undoAction()" title="復原 Ctrl+Z">↩ 復原</button>
        <button class="btn btn-export" onclick="exportTxt()">↓ 匯出</button>
      </div>
    </header>

    <div class="work-area">
      <div class="pane pane-left">
        <div class="pane-header">
          <span class="pane-label">筆記內容</span>
          <span style="font-size:11px;color:var(--text-tertiary);margin-left:auto;">選取文字 → 點顏色標記 ｜ Ctrl+Z 復原</span>
        </div>
        <div id="editor" contenteditable="true"
             data-placeholder="在此貼上或輸入文字，可直接編輯修改。&#10;選取文字後點選上方顏色即可標記。"
             spellcheck="false"></div>
      </div>

      <div class="pane pane-right">
        <div class="pane-header">
          <span class="pane-label">重點彙整</span>
          <span class="pane-count" id="count-badge">0 條</span>
        </div>
        <div class="highlights-scroll" id="highlights-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Delete confirmation modal -->
<div class="modal-backdrop hidden" id="delete-modal">
  <div class="modal">
    <h3>🗑 刪除筆記本</h3>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:6px;">
      確定要刪除「<strong id="delete-modal-name"></strong>」嗎？
    </p>
    <p style="font-size:12px;color:var(--text-tertiary);">此動作無法復原，筆記本內的所有標記也會一併刪除。</p>
    <div class="modal-btns">
      <button class="btn" onclick="closeDeleteModal()">取消</button>
      <button class="btn" onclick="confirmDelete()" style="background:#C0392B;color:#fff;border-color:#C0392B;">確定刪除</button>
    </div>
  </div>
</div>

<!-- New notebook modal -->
<div class="modal-backdrop hidden" id="modal">
  <div class="modal">
    <h3>📓 新增筆記本</h3>
    <input type="text" id="modal-input" placeholder="輸入筆記本名稱…" maxlength="40"
           onkeydown="if(event.key==='Enter') confirmNew(); if(event.key==='Escape') closeModal();">
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="confirmNew()">建立</button>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────
const STORAGE_KEY = 'hlnotes_v2';
const colorInfo = {
  yellow: { hex:'#FFE066', text:'#7A6000', label:'黃色', bg:'#FFF8CC' },
  green:  { hex:'#A8E6B0', text:'#1A5C28', label:'綠色', bg:'#E8F8EB' },
  blue:   { hex:'#9BD4F5', text:'#0A4A6E', label:'藍色', bg:'#E5F4FD' },
  pink:   { hex:'#F9B8D0', text:'#7A1B40', label:'粉紅', bg:'#FDE8F1' },
  orange: { hex:'#FFCB82', text:'#7A4200', label:'橘色', bg:'#FFF0D8' },
};

// ── App state ────────────────────────────────────────────────────
let notebooks   = [];   // [{ id, name, html }]
let activeId    = null;
let mode        = 'highlight';
let currentColor = 'yellow';
let currentHex   = '#FFE066';
let currentTextC = '#7A6000';
let saveTimer    = null;

// Undo stack per notebook: { [id]: [htmlSnapshot, ...] }
let undoStacks  = {};
const MAX_UNDO  = 50;

const editor    = document.getElementById('editor');

// ── Persistence ──────────────────────────────────────────────────
function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ notebooks, activeId }));
  } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    notebooks = data.notebooks || [];
    activeId  = data.activeId  || null;
  } catch(e) {}
}

function scheduleSave(label = '已自動存檔') {
  const dot = document.getElementById('save-dot');
  const txt = document.getElementById('save-text');
  dot.classList.add('saving');
  txt.textContent = '儲存中…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    // Flush editor html back to notebook
    if (activeId) {
      const nb = notebooks.find(n => n.id === activeId);
      if (nb) nb.html = editor.innerHTML;
    }
    persist();
    dot.classList.remove('saving');
    txt.textContent = label;
  }, 600);
}

// ── Undo ─────────────────────────────────────────────────────────
function pushUndo() {
  if (!activeId) return;
  if (!undoStacks[activeId]) undoStacks[activeId] = [];
  const stack = undoStacks[activeId];
  const snap  = editor.innerHTML;
  if (stack.length && stack[stack.length-1] === snap) return;
  stack.push(snap);
  if (stack.length > MAX_UNDO) stack.shift();
}

function undoAction() {
  if (!activeId) return;
  const stack = undoStacks[activeId] || [];
  if (stack.length === 0) return;
  const snap = stack.pop();
  editor.innerHTML = snap;
  reattachMarkHandlers();
  renderHighlights();
  scheduleSave('已復原');
}

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    // Only intercept if editor is focused or no input focused
    const focused = document.activeElement;
    if (focused === editor || focused === document.body || !focused) {
      e.preventDefault();
      undoAction();
    }
  }
});

// ── Notebook CRUD ────────────────────────────────────────────────
function genId() {
  return 'nb_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
}

function openNewModal() {
  document.getElementById('modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('modal-input').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  document.getElementById('modal-input').value = '';
}

function confirmNew() {
  const name = document.getElementById('modal-input').value.trim() || '未命名筆記本';
  closeModal();
  createNotebook(name);
}

function createNotebook(name) {
  const nb = { id: genId(), name, html: '' };
  notebooks.push(nb);
  renderSidebar();
  selectNotebook(nb.id);
  persist();
}

function selectNotebook(id) {
  // Save current editor html
  if (activeId) {
    const cur = notebooks.find(n => n.id === activeId);
    if (cur) cur.html = editor.innerHTML;
  }
  activeId = id;
  const nb = notebooks.find(n => n.id === id);
  if (!nb) return;

  // Show editor area
  document.getElementById('no-notebook').style.display = 'none';
  const area = document.getElementById('editor-area');
  area.style.display = 'flex';
  area.style.flexDirection = 'column';
  area.style.overflow = 'hidden';

  // Load content
  editor.innerHTML = nb.html || '';
  reattachMarkHandlers();
  document.getElementById('nb-title-display').textContent = nb.name;
  renderSidebar();
  renderHighlights();
  scheduleSave('已載入');
}

function deleteNotebook(id) {
  openDeleteModal(id);
}

function openDeleteModal(id) {
  const nb = notebooks.find(n => n.id === id);
  if (!nb) return;
  document.getElementById('delete-modal-name').textContent = nb.name;
  document.getElementById('delete-modal').classList.remove('hidden');
  document.getElementById('delete-modal').dataset.targetId = id;
}

function closeDeleteModal() {
  document.getElementById('delete-modal').classList.add('hidden');
}

function confirmDelete() {
  const id = document.getElementById('delete-modal').dataset.targetId;
  closeDeleteModal();
  doDeleteNotebook(id);
}

function doDeleteNotebook(id) {
  notebooks = notebooks.filter(n => n.id !== id);
  delete undoStacks[id];
  if (activeId === id) {
    activeId = notebooks.length ? notebooks[notebooks.length - 1].id : null;
    if (activeId) {
      selectNotebook(activeId);
    } else {
      editor.innerHTML = '';
      document.getElementById('editor-area').style.display = 'none';
      document.getElementById('no-notebook').style.display = 'flex';
    }
  }
  renderSidebar();
  persist();
}

function startRename(id, nameEl) {
  const nb = notebooks.find(n => n.id === id);
  if (!nb) return;
  nameEl.contentEditable = 'true';
  nameEl.focus();
  const range = document.createRange();
  range.selectNodeContents(nameEl);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  function finish() {
    nameEl.contentEditable = 'false';
    const newName = nameEl.textContent.trim() || '未命名筆記本';
    nb.name = newName;
    nameEl.textContent = newName;
    if (activeId === id) document.getElementById('nb-title-display').textContent = newName;
    persist();
  }
  nameEl.onblur = finish;
  nameEl.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); nameEl.blur(); } };
}

function renderSidebar() {
  const list = document.getElementById('notebook-list');
  if (notebooks.length === 0) {
    list.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:#555550;">尚無筆記本</div>';
    return;
  }
  list.innerHTML = notebooks.map(nb => `
    <div class="nb-item ${nb.id === activeId ? 'active' : ''}" onclick="selectNotebook('${nb.id}')">
      <span class="nb-icon">📓</span>
      <span class="nb-name" id="nbname_${nb.id}">${escHtml(nb.name)}</span>
      <span class="nb-actions">
        <button class="nb-action-btn" onclick="event.stopPropagation();startRename('${nb.id}',document.getElementById('nbname_${nb.id}'))" title="重新命名">✏️</button>
        <button class="nb-action-btn" onclick="event.stopPropagation();deleteNotebook('${nb.id}')" title="刪除">🗑</button>
      </span>
    </div>
  `).join('');
}

// ── Mode & Color ────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  const isHL = m === 'highlight';
  document.getElementById('btn-mark').classList.toggle('active', isHL);
  document.getElementById('btn-erase').classList.toggle('active', !isHL);
  document.getElementById('erase-label').classList.toggle('visible', !isHL);
  document.getElementById('color-palette').style.opacity = isHL ? '1' : '0.35';
  editor.style.cursor = isHL ? 'text' : 'crosshair';
}

function setColor(name, hex, textCol, btn) {
  currentColor = name; currentHex = hex; currentTextC = textCol;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (mode !== 'highlight') setMode('highlight');
}

// ── Highlighting ─────────────────────────────────────────────────
editor.addEventListener('mouseup', handleSelection);
editor.addEventListener('touchend', () => setTimeout(handleSelection, 50));
editor.addEventListener('input', () => { scheduleSave(); });
editor.addEventListener('keydown', e => {
  // Push undo before significant edits (but not ctrl+z itself)
  if (!(e.ctrlKey || e.metaKey)) return;
  // handled above
});

// Push undo snapshot before each keypress that changes content
editor.addEventListener('keydown', e => {
  const modifying = !e.ctrlKey && !e.metaKey && !e.altKey &&
    (e.key.length === 1 || e.key === 'Backspace' || e.key === 'Delete' || e.key === 'Enter');
  if (modifying) pushUndo();
});

function handleSelection() {
  if (!activeId) return;
  const sel = window.getSelection();
  if (!sel || sel.isCollapsed || !sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const text  = sel.toString().trim();
  if (!text || !editor.contains(range.commonAncestorContainer)) return;

  if (mode === 'erase') {
    pushUndo();
    eraseMarksInRange(range);
    sel.removeAllRanges();
    renderHighlights();
    scheduleSave();
    return;
  }

  pushUndo();
  const mark = document.createElement('mark');
  const id   = 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,5);
  mark.dataset.id    = id;
  mark.dataset.color = currentColor;
  mark.style.background = currentHex;
  mark.style.color      = currentTextC;
  mark.title = '點擊移除此標記';
  mark.onclick = function(e) { e.stopPropagation(); pushUndo(); removeMarkEl(this); };

  try { range.surroundContents(mark); }
  catch(e) { const f = range.extractContents(); mark.appendChild(f); range.insertNode(mark); }

  sel.removeAllRanges();
  renderHighlights();
  scheduleSave();

  // Scroll newly added item into view
  const marks = getMarksInDocOrder();
  const idx   = marks.findIndex(m => m.dataset.id === id);
  setTimeout(() => {
    const items = document.querySelectorAll('#highlights-list .hi-item');
    if (items[idx]) {
      items[idx].scrollIntoView({ behavior:'smooth', block:'nearest' });
      items[idx].classList.add('flash');
      setTimeout(() => items[idx].classList.remove('flash'), 500);
    }
  }, 40);
}

function eraseMarksInRange(range) {
  editor.querySelectorAll('mark').forEach(m => {
    if (range.intersectsNode(m)) unwrapMark(m);
  });
}

function unwrapMark(m) {
  const p = m.parentNode;
  while (m.firstChild) p.insertBefore(m.firstChild, m);
  p.removeChild(m);
  editor.normalize();
}

function removeMarkEl(markEl) {
  unwrapMark(markEl);
  renderHighlights();
  scheduleSave();
}

function reattachMarkHandlers() {
  editor.querySelectorAll('mark').forEach(m => {
    m.onclick = function(e) { e.stopPropagation(); pushUndo(); removeMarkEl(this); };
  });
}

// ── Render highlights in DOM order ───────────────────────────────
function getMarksInDocOrder() {
  return [...editor.querySelectorAll('mark[data-id]')];
}

function renderHighlights() {
  const list  = document.getElementById('highlights-list');
  const badge = document.getElementById('count-badge');
  const marks = getMarksInDocOrder();
  const n     = marks.length;
  badge.textContent = n + ' 條';

  if (n === 0) {
    list.innerHTML = '<div class="empty-state"><span class="empty-icon">🔖</span>選取文字後點選顏色<br>重點會自動彙整到這裡</div>';
    return;
  }

  list.innerHTML = marks.map(m => {
    const c = colorInfo[m.dataset.color] || colorInfo.yellow;
    return `<div class="hi-item" data-ref="${m.dataset.id}"
      style="background:${c.bg};border-color:${c.hex}88;"
      onclick="scrollToMark('${m.dataset.id}')">
      <span class="hi-dot" style="background:${c.hex};"></span>
      <span>${escHtml(m.textContent.trim())}</span>
    </div>`;
  }).join('');
}

function scrollToMark(id) {
  const mark = editor.querySelector(`mark[data-id="${id}"]`);
  if (mark) mark.scrollIntoView({ behavior:'smooth', block:'center' });
}

// ── Export ───────────────────────────────────────────────────────
function exportTxt() {
  const marks = getMarksInDocOrder();
  if (!activeId) { alert('請先開啟一個筆記本。'); return; }
  if (marks.length === 0) { alert('還沒有任何螢光筆標記喔！'); return; }

  const nb = notebooks.find(n => n.id === activeId);
  const groups = {};
  marks.forEach(m => {
    const label = (colorInfo[m.dataset.color] || colorInfo.yellow).label;
    if (!groups[label]) groups[label] = [];
    groups[label].push(m.textContent.trim());
  });

  let out = `螢光筆筆記 — ${nb ? nb.name : '筆記本'}\n`;
  out += '匯出時間：' + new Date().toLocaleString('zh-TW') + '\n';
  out += '共 ' + marks.length + ' 條標記\n';
  out += '═'.repeat(36) + '\n\n';
  out += '【依文章順序】\n';
  marks.forEach((m, i) => {
    const label = (colorInfo[m.dataset.color] || colorInfo.yellow).label;
    out += (i+1) + '. [' + label + '] ' + m.textContent.trim() + '\n';
  });
  out += '\n';
  Object.entries(groups).forEach(([label, items]) => {
    out += '【' + label + '】\n';
    items.forEach((t, i) => { out += (i+1) + '. ' + t + '\n'; });
    out += '\n';
  });

  const blob = new Blob([out], { type:'text/plain;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `螢光筆筆記_${nb ? nb.name : 'notes'}_${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── Helpers ──────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Close modal on backdrop click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('delete-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('delete-modal')) closeDeleteModal();
});

// ── Init ─────────────────────────────────────────────────────────
load();
renderSidebar();
if (activeId && notebooks.find(n => n.id === activeId)) {
  selectNotebook(activeId);
} else if (notebooks.length) {
  selectNotebook(notebooks[0].id);
}
</script>
